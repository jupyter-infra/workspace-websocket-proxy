name: "Release: Stage Image"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      short_sha:
        required: true
        type: string
    outputs:
      short_sha:
        value: ${{ jobs.build-and-push.outputs.short_sha }}
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (e.g. v0.1.0)'
        required: true
      short_sha:
        description: 'Short SHA (leave empty to use current HEAD)'
        required: false

env:
  STAGING_REGISTRY: ghcr.io/jupyter-infra/staging
  IMAGE_NAME: workspace-websocket-proxy

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve short SHA
        id: sha
        run: |
          SHA="${{ inputs.short_sha }}"
          if [ -z "$SHA" ]; then
            SHA=$(git rev-parse --short HEAD)
          fi
          echo "short_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.STAGING_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.STAGING_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short_sha }}
            ${{ env.STAGING_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
