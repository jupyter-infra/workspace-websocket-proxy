apiVersion: v1
kind: Pod
metadata:
  name: ws-proxy-e2e
  labels:
    app: ws-proxy-e2e
spec:
  containers:
    # Echo TCP server on port 2222 (simulates the remote access server)
    - name: echo-server
      image: alpine:latest
      command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache socat
          exec socat TCP-LISTEN:2222,fork,reuseaddr EXEC:cat
      ports:
        - containerPort: 2222

    # WebSocket proxy sidecar
    - name: ws-proxy
      image: jupyter-k8s-ws-proxy:test
      env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: TARGET_HOST
          value: "127.0.0.1"
        - name: TARGET_PORT
          value: "2222"
        - name: MAX_SESSION_DURATION
          value: "1h"
        - name: PING_INTERVAL
          value: "10s"
        - name: PING_TIMEOUT
          value: "30s"
        - name: MAX_CONNECTIONS
          value: "10"
      ports:
        - containerPort: 8080
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 1
        periodSeconds: 2
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        periodSeconds: 10
